# Render Blueprint Specification for Cooperative Organization Finance Management & Data Redundancy
databases:
  - name: cooperative-postgres-db
    databaseName: coop_redundancy
    user: coop_user
    plan: free

services:
  - type: web
    name: coop-financials-redundancy
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/server.cjs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cooperative-postgres-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # Set privately in the Render dashboard
